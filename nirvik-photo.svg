<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nirvik Acharya profile photo placeholder">
  <defs>
    <linearGradient id="bg" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#185FA5"/>
      <stop offset="1" stop-color="#534AB7"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="6"/>

  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="148" font-weight="800" fill="#FFFFFF">NA</text>

  <text x="50%" y="74%" dominant-baseline="middle" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="26" font-weight="600" fill="#FFFFFF" opacity="0.9">Replace with your photo</text>
</svg>
